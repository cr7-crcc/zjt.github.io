        function selectSummaryProject(pid, company) {
            window._summarySelectedPid = pid;
            window._summarySelectedCompany = company;
            refreshSummaryTab();
        }

        function refreshSummaryTab() {
            document.getElementById('mainContent').innerHTML = renderSummary();
        }

        // ==================== 年度竣备交付 ====================
        window._annualSelectedPid = null;
        window._annualSelectedCompany = null;

        function getAvailableYears() {
            const years = new Set();
            _projects.forEach(p => {
                (p.phases || []).forEach(ph => {
                    if (ph.completionTime) years.add(parseInt(ph.completionTime.substring(0, 4)));
                    if (ph.deliveryTime) years.add(parseInt(ph.deliveryTime.substring(0, 4)));
                });
            });
            const arr = [...years].sort();
            const thisYear = new Date().getFullYear();
            if (!years.has(thisYear)) arr.push(thisYear);
            arr.sort();
            return arr;
        }

        function renderAnnual() {
            const availableYears = getAvailableYears();
            const thisYear = new Date().getFullYear();
            const selYear = document.getElementById('annualYear')?.value || (availableYears.includes(thisYear) ? thisYear : availableYears[availableYears.length - 1]);
            const year = parseInt(selYear);

            const isAll = !window._annualSelectedPid && !window._annualSelectedCompany;

            let html = '<div class="sidebar-layout">';

            // ===== 左侧导航栏 =====
            html += '<div class="sidebar-nav"><div class="sidebar-header">📋 项目列表</div>';
            html += `<div style="padding:8px 10px;"><button class="btn btn-sm ${isAll?'btn-primary':'btn-outline'}" style="width:100%;border-color:#999;color:#555;" onclick="selectAnnualProject(null,null)">📊 显示全部</button></div>`;
            COMPANIES.forEach(c => {
                const cProjs = _projects.filter(p => p.company === c);
                if (cProjs.length === 0) return;
                const isCompanyActive = window._annualSelectedCompany === c;
                const hasProjectActive = !window._annualSelectedCompany && cProjs.some(p => p.id === window._annualSelectedPid);
                const isExpanded = isCompanyActive || hasProjectActive;
                html += '<div class="sidebar-company">';

                html += `<span style="${isCompanyActive?'color:#1a3c5e;font-weight:700;':''}">🏢 ${c} <span style="font-size:0.8em;color:#999;">(${cProjs.length})</span></span>`;
                html += `<span class="arrow${isExpanded ? ' open' : ''}" onclick="event.stopPropagation();toggleSidebarCompany(this.parentElement)">▶</span>`;
                html += '</div>';
                html += `<div class="sidebar-company-projects${isExpanded ? ' open' : ''}">`;
                cProjs.forEach(p => {
                    const isActive = !isCompanyActive && p.id === window._annualSelectedPid;
                    html += `<div class="sidebar-project${isActive ? ' active' : ''}" onclick="selectAnnualProject('${p.id}',null)">`;

            html += '</div>';

            // ===== 右侧内容区 =====
            html += '<div class="sidebar-content">';
            html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><h3 style="margin:0;">📅 年度竣备、交付项目进度一览表</h3>';
            html += '<span class="text-sm"><span style="background:#d6eaf8;padding:2px 6px;border-radius:3px;">天蓝底<b>竣备</b>=竣备月</span> <span style="background:#fff9c4;padding:2px 6px;border-radius:3px;">黄底<b>交付</b>=交付月</span></span></div>';
            // 标题显示当前筛选范围
            if (window._annualSelectedCompany) {
                html += `<p class="text-sm" style="color:var(--accent);">📍 筛选公司：<strong>${window._annualSelectedCompany}</strong></p>`;
            } else if (window._annualSelectedPid) {
                const sel = _projects.find(p => p.id === window._annualSelectedPid);
                if (sel) html += `<p class="text-sm" style="color:var(--accent);">📍 筛选项目：<strong>${sel.company} · ${sel.name}</strong></p>`;
            }
            html += '<div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;" class="mb-8"><div class="form-group"><label>选择年度</label><select id="annualYear" onchange="refreshAnnualTab()">';
            availableYears.forEach(y => {
                html += `<option value="${y}" ${y == selYear ? 'selected' : ''}>${y}年</option>`;
            });
            html += '</select></div>';
            html += '<button class="btn btn-sm btn-outline no-print" style="border-color:#999;color:#555;" onclick="printAnnualTable()">🖨️ 打印</button></div>';

            let filterProjects = _projects;
            if (window._annualSelectedCompany) {
                filterProjects = _projects.filter(p => p.company === window._annualSelectedCompany);
            } else if (window._annualSelectedPid) {
                filterProjects = _projects.filter(p => p.id === window._annualSelectedPid);
            }
            const relevant = [];
            filterProjects.forEach(p => {
                (p.phases || []).forEach(ph => {
                    const ctYear = ph.completionTime ? parseInt(ph.completionTime.substring(0, 4)) : null;
                    const dtYear = ph.deliveryTime ? parseInt(ph.deliveryTime.substring(0, 4)) : null;

            html +=
                '<table style="table-layout:auto;"><thead><tr><th style="width:60px;">所属公司</th><th style="width:38px;">序号</th><th style="min-width:100px;max-width:150px;">项目</th><th style="width:70px;">标段</th><th style="width:50px;">类型</th><th style="width:65px;">交付标准</th><th style="width:45px;">户数</th><th style="width:85px;">竣备时间</th><th style="width:85px;">交付时间</th><th style="width:42px;">1月</th><th style="width:42px;">2月</th><th style="width:42px;">3月</th><th style="width:42px;">4月</th><th style="width:42px;">5月</th><th style="width:42px;">6月</th><th style="width:42px;">7月</th><th style="width:42px;">8月</th><th style="width:42px;">9月</th><th style="width:42px;">10月</th><th style="width:42px;">11月</th><th style="width:42px;">12月</th></tr></thead><tbody>';

            // 按公司分组，再按项目合并，全局累计序号

            while (i < relevant.length) {

                        html += `<td><span class="tag" style="background:${typeTagColor};${typeTooltip?'cursor:help;':''}" ${typeTooltip?'data-tip="'+typeTooltip+'" onmouseenter="showQuickTooltip(event,this.dataset.tip)" onmouseleave="hideQuickTooltip()"':''}>${r.project.type}</span></td>`;

            tip.style.whiteSpace = 'normal';

            requestAnimationFrame(() => {
                const rect = tip.getBoundingClientRect();
                let x = e.clientX + 14, y = e.clientY - 10;
                if (x + rect.width > window.innerWidth) x = Math.max(5, e.clientX - rect.width - 14);

        // ==================== 导入导出 ====================
        function exportAll() {
            const data = loadData();
            const now = getNowShort().replace(/[:\s]/g, '').substring(0, 15);
            const filename = `CRCCRE_${USER_NAME}_三阶四验数据备份_${now}.json`;
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 数据已导出: ' + filename);
        }

        // 将 sj.json 格式转换为 index.html 内部格式
        function convertSJFormatToInternal(data) {
            // 如果是数组，说明已经是内部格式或老格式，直接返回
            if (Array.isArray(data)) return data;
            // 如果是 { projects: [...] } 格式（sj.json），进行转换
            if (data.projects && Array.isArray(data.projects)) {
                return data.projects.map(p => convertSJProject(p));
            }
            // 其他情况返回原数据
            return data;
        }

        function convertSJProject(p) {
            const proj = {
                id: p.id || ('proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6)),
                name: p.name || '',
                company: p.company || '北方',
                area: p.area || '',
                负责人: p.engineer || '',
                type: p.type || '操盘',
                landAcquisitionTime: p.landDate || '',
                openingTime: p.openDate || '',
                partner: p.partner || '',
                shareRatio: p.shareRatio || '',
                ourLines: p.lines || '',
                owner: p.owner || '',
                bidWinTime: p.bidDate || p.bidWinTime || '',
                agentLines: p.agentLines || '',
                brandOutput: p.brandOutput || '否',
                phases: (p.phases || []).map(ph => convertSJPhase(ph))
            };
            return proj;
        }

        function convertSJPhase(ph) {
            const phase = {
                id: ph.id || ('phase_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6)),
                name: ph.name || '一期',
                area: ph.area || '',
                status: ph.status || '在建',
                contractor: ph.contractor || '',
                deliveryStandard: ph.deliveryStandard || '毛坯',
                deliveryUnits: parseInt(ph.deliveryHouseholds) || 0,
                completionTime: ph.completionDate || '',
                deliveryTime: ph.deliveryDate || '',
                contractDeliveryTime: ph.contractDeliveryDate || '',
                inspectionStartTime: ph.inspectionStartDate || '',
                openDayPlanTime: ph.openDayPlanDate || '',
                jointEvalPlanTime: ph.jointAssessmentPlanDate || '',
                deliveryScope: ph.deliveryScope || '',
                monthlyFeedbacks: {}
            };

            // 主月份：从 lastUpdateTime 提取，用于存放进度、承查、开放日、联合评估、两个1
            const mainYM = extractYearMonth(ph.lastUpdateTime);

            // 1. 每个质量检查放入各自的 checkMonth，为每月创建独立反馈条目
            (ph.qualityChecks || []).forEach(qc => {
                const qcYM = qc.checkMonth || mainYM; // checkMonth 如 "2026-01"
                if (!qcYM) return;
                if (!phase.monthlyFeedbacks[qcYM]) {
                    phase.monthlyFeedbacks[qcYM] = createEmptyFeedback();
                }
                // 追加该月的检查轮次
                if (!phase.monthlyFeedbacks[qcYM].threeFourCheck.inspectionRounds) {
                    phase.monthlyFeedbacks[qcYM].threeFourCheck.inspectionRounds = [];
                }
                phase.monthlyFeedbacks[qcYM].threeFourCheck.inspectionRounds.push({
                    type: qc.checkType || '',
                    date: qc.checkDate || '',
                    score: qc.score ?? '',
                    leader: '组长',
                    members: '组员',
                    files: (qc.files || []).map(f => (f && f.data) ? f.data : '')
                });
                // 标记该月有反馈
                phase.monthlyFeedbacks[qcYM].lastUpdate = ph.lastUpdateTime || '';
                phase.monthlyFeedbacks[qcYM].lastUser = ph.lastUpdateUser || '';
            });

            // 2. 进度、承查、开放日、联合评估、两个1 → 放入主月份
            if (mainYM) {
                if (!phase.monthlyFeedbacks[mainYM]) {
                    phase.monthlyFeedbacks[mainYM] = createEmptyFeedback();
                }
                const fb = phase.monthlyFeedbacks[mainYM];

                // 进度（覆盖默认空值）
                fb.progress = {
                    indoor: ph.progress?.indoor ?? '',
                    public: ph.progress?.public ?? '',
                    facade: ph.progress?.facade ?? '',
                    outdoor: ph.progress?.outdoor ?? '',
                    basement: ph.progress?.basement ?? '',
                    slowestBuilding: ph.progress?.slowBuildingNo || '',
                    slowestTypes: ph.progress?.slowProgress || {}
                };

                // 承接查验
                fb.threeFourCheck.inspectionRoundsData = [
                    convertAcceptanceCheck(ph.acceptanceChecks?.round1),
                    convertAcceptanceCheck(ph.acceptanceChecks?.round2),
                    convertAcceptanceCheck(ph.acceptanceChecks?.round3)
                ];

                // 工地开放日
                fb.threeFourCheck.openDay = {
                    conducted: ph.openDay?.status === '已开展',
                    actualDate: ph.openDay?.actualDate || '',
                    clientGroups: ph.openDay?.guests || 0,
                    photos: ph.openDay?.photos || []
                };

                // 交付联合评估
                fb.threeFourCheck.jointEval = {
                    conducted: ph.jointAssessment?.status === '已开展',
                    actualDate: ph.jointAssessment?.actualDate || '',
                    photos: ph.jointAssessment?.photos || []
                };

                // 两个1
                fb.twoOne = {
                    deliveryStart: ph.twoOne?.deliveryStart || '',
                    deliveryEnd: ph.twoOne?.deliveryEnd || '',
                    actualUnits: ph.twoOne?.actualUnits || '',
                    issuesPerHousehold: ph.twoOne?.issuesPerHousehold || '',
                    indicator1: ph.twoOne?.indicator1 || '',
                    indicator2: ph.twoOne?.indicator2 || '',
                    attachment: Array.isArray(ph.twoOne?.attachment) ?
                        (ph.twoOne.attachment.length > 0 ? ph.twoOne.attachment[0] : '') :
                        (ph.twoOne?.attachment || '')
                };

                fb.lastUpdate = ph.lastUpdateTime || '';
                fb.lastUser = ph.lastUpdateUser || '';
            }

            return phase;
        }

        // 创建空的月度反馈结构
        function createEmptyFeedback() {
            return {
                progress: { indoor: '', public: '', facade: '', outdoor: '', basement: '', slowestBuilding: '', slowestTypes: {} },
                threeFourCheck: {
                    inspectionRounds: [],
                    inspectionRoundsData: [
                        { conducted: false, remaining: 0, scope: '', unit: '' },
                        { conducted: false, remaining: 0, scope: '', unit: '' },
                        { conducted: false, remaining: 0, scope: '', unit: '' }
                    ],
                    openDay: { conducted: false, actualDate: '', clientGroups: 0, photos: [] },
                    jointEval: { conducted: false, actualDate: '', photos: [] }
                },
                twoOne: { indicator1: '', indicator2: '', attachment: '' },
                lastUpdate: '',
                lastUser: ''
            };
        }

        function convertAcceptanceCheck(round) {
            if (!round) return { conducted: false, remaining: 0, scope: '', unit: '' };
            return {
                conducted: round.status === '已开展',
                remaining: parseInt(round.remainingIssues) || 0,
                scope: round.scope || '',
                unit: round.unit || ''
            };
        }

        // 从 "2026/5/28 13:49:34" 或 "2026-05-28" 格式提取 YYYY-MM
        function extractYearMonth(timeStr) {
            if (!timeStr) return null;
            const m = timeStr.match(/(\d{4})[\/\-.](\d{1,2})/);
            if (m) {
                return m[1] + '-' + m[2].padStart(2, '0');
            }
            return null;
        }

        function importAll(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const raw = JSON.parse(e.target.result);
                    // 自动检测并转换 sj.json 格式
                    const imported = convertSJFormatToInternal(raw);
                    if (!Array.isArray(imported)) throw new Error('无法识别的数据格式，请确认JSON文件结构正确');
                    const importInfo = `导入:${file.name} ${getNowShort()}`;
                    // 覆盖已有项目，但不删除导入文件中没有的项目
                    const existingIds = new Set(_projects.map(p => p.id));
                    imported.forEach(ip => {
                        ip._importInfo = importInfo;
                        const idx = _projects.findIndex(p => p.id === ip.id);
                        if (idx >= 0) {
                            _projects[idx] = ip;
                            existingIds.delete(ip.id);
                        } else {
                            _projects.push(ip);
                        }
                    });
                    // existingIds中剩余的是导入文件中没有的，保留不删除
                    saveData(_projects);
                    renderCurrentTab();
                    showToast('📤 数据已导入（覆盖已有，保留未包含项目）');
                } catch (err) {
                    showToast('❌ 导入失败：' + err.message);
                    console.error('导入错误:', err);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ==================== 一键清理 ====================
        function showCleanModal() {
            const container = document.getElementById('cleanCompanyChecks');
            container.innerHTML = '<div style="margin-bottom:8px;display:flex;gap:6px;"><button class="btn btn-sm" style="font-size:0.75em;padding:2px 10px;background:#e8f0fe;border:1px solid #b0c4de;border-radius:12px;" onclick="var all=document.querySelectorAll(\'#cleanCompanyChecks input[type=checkbox]\');all.forEach(function(cb){cb.checked=true;cb.dispatchEvent(new Event(\'change\'))})">全选公司</button><button class="btn btn-sm" style="font-size:0.75em;padding:2px 10px;background:#fef0f0;border:1px solid #e0c0c0;border-radius:12px;" onclick="var all=document.querySelectorAll(\'#cleanCompanyChecks input[type=checkbox]\');all.forEach(function(cb){cb.checked=false;cb.dispatchEvent(new Event(\'change\'))})">取消全选</button></div>' +
                COMPANIES.map(c => {
                const cProjs = _projects.filter(p => p.company === c);
                return '<div style="margin-bottom:6px;">' +
                    '<label style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#fff;border-radius:16px;border:1px solid #e0e0e0;font-size:0.85em;font-weight:600;cursor:pointer;width:100%;"><input type="checkbox" class="clean-company-cb" value="' + c + '" onchange="toggleCleanCompany(this)" style="accent-color:#e74c3c;"> ' + c + ' <span style="font-weight:400;font-size:0.75em;color:#999;">(' + cProjs.length + '个项目)</span></label>' +
                    '<div class="clean-projects" data-company="' + c + '" style="display:none;padding:4px 0 4px 20px;">' +
                    cProjs.map(p => '<label style="display:flex;align-items:center;gap:4px;padding:2px 0;font-size:0.78em;cursor:pointer;"><input type="checkbox" class="clean-proj-' + c + '" value="' + p.id + '" style="accent-color:#e74c3c;"> ' + p.name + '</label>').join('') +
                    '</div></div>';
            }).join('');
            var existing = document.getElementById('cleanTypeRadios'); if (existing) existing.remove();
                const typeHTML = '<div id="cleanTypeRadios" style="display:flex;flex-direction:column;gap:6px;margin-top:12px;">' +
                    ['projects','monthly','inspection','files','all'].map((v,i) => {
                        const labels = {projects:'项目数据',monthly:'月度信息反馈',inspection:'质检小组信息',files:'清除上传附件',all:'全部数据'};
                        const descs = {projects:'删除选中的项目或整个公司',monthly:'清空所有标段的月度数据',inspection:'清空质检小组人员及台账',files:'清除所有上传的附件文件',all:'以上全部清理'};
                        return '<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border-radius:10px;border:1px solid #e0e0e0;cursor:pointer;font-size:0.82em;"><input type="radio" name="cleanType" value="'+v+'"'+(i===0?' checked':'')+' style="accent-color:#e74c3c;"><div><div>'+labels[v]+'</div><div style="font-size:0.78em;color:#999;">'+descs[v]+'</div></div></label>';
                    }).join('') + '</div>';
                container.insertAdjacentHTML('afterend', typeHTML);
            document.getElementById('cleanModal').style.display = 'flex';
        }

        function toggleCleanCompany(cb) {
            const div = document.querySelector('.clean-projects[data-company="' + cb.value + '"]');
            if (div) div.style.display = cb.checked ? 'block' : 'none';
            // uncheck all projects when company is unchecked
            if (!cb.checked) {
                document.querySelectorAll('.clean-proj-' + cb.value).forEach(el => el.checked = false);
            }
        }

        function executeClean() {
            const checkedCompanies = [];
            document.querySelectorAll('.clean-company-cb:checked').forEach(el => checkedCompanies.push(el.value));
            const checkedProjects = [];
            checkedCompanies.forEach(c => { document.querySelectorAll('.clean-proj-' + c + ':checked').forEach(el => checkedProjects.push(el.value)); });
            const checked = checkedProjects.length > 0 ? checkedCompanies : checkedCompanies; // always use company list
            const hasSub = checkedProjects.length > 0;
            if (checked.length === 0) { showToast('请至少选择一个公司'); return; }
            const cleanType = document.querySelector('input[name="cleanType"]:checked')?.value || 'projects';
            const typeNames = { projects: '项目数据', monthly: '月度信息反馈', inspection: '质检小组信息', all: '全部数据' };
            if (confirm(`确定清理以下公司的${typeNames[cleanType]}吗？\n${checkedCompanies.join('、')}\n此操作不可恢复！`)) {
                if (cleanType === 'projects' || cleanType === 'all') {
                    if (hasSub) _projects = _projects.filter(p => !checkedProjects.includes(p.id));
                    else _projects = _projects.filter(p => !checkedCompanies.includes(p.company));
                }
                if (cleanType === 'monthly' || cleanType === 'all') {
                    checkedCompanies.forEach(c => { _projects.filter(p => p.company === c).forEach(p => { (p.phases||[]).forEach(ph => { ph.monthlyFeedbacks = {}; }); }); });
                }
                if (cleanType === 'inspection' || cleanType === 'all') {
                    const teams = loadTeamData();
                    checkedCompanies.forEach(c => { delete teams[c]; });
                    saveTeamData(teams);
                    // 同时清理检查类别数据
                    checkedCompanies.forEach(c => { _projects.filter(p => p.company === c).forEach(p => { (p.phases||[]).forEach(ph => { (ph.monthlyFeedbacks && Object.values(ph.monthlyFeedbacks).forEach(fb => { delete fb.inspType; delete fb.inspSubType; delete fb.lastUpdate; })); }); }); });
                }
                if (cleanType === 'files' || cleanType === 'all') {
                    const delAllFiles = async function() { const db = await FILE_DB._open(); const tx = db.transaction('files','readwrite'); tx.objectStore('files').clear(); tx.oncomplete = function(){}; };
                    delAllFiles();
                    _projects.forEach(p => { (p.phases||[]).forEach(ph => { if (ph.monthlyFeedbacks) { Object.values(ph.monthlyFeedbacks).forEach(fb => { if (fb.twoOne) { if (fb.twoOne.files1) fb.twoOne.files1 = []; if (fb.twoOne.leakInspection3?.files) fb.twoOne.leakInspection3.files = []; if (fb.twoOne.leakInspection6?.files) fb.twoOne.leakInspection6.files = []; } if (fb.threeFourCheck) { if (fb.threeFourCheck.inspectionRounds) fb.threeFourCheck.inspectionRounds.forEach(r => { if (r.files) r.files = []; }); if (fb.threeFourCheck.inspectionRoundsData) fb.threeFourCheck.inspectionRoundsData.forEach(r => { if (r.files) r.files = []; }); if (fb.threeFourCheck.jointEval?.files) fb.threeFourCheck.jointEval.files = []; if (fb.threeFourCheck.openDay?.files) fb.threeFourCheck.openDay.files = []; } }); } }); });
                }
                saveData(_projects);
                document.getElementById('cleanModal').style.display = 'none';
                renderCurrentTab();
                showToast('🧹 已清理：' + checkedCompanies.join('、'));
            }
        }

        function toggleCleanCompany(cb) {
            const div = document.querySelector('.clean-projects[data-company="' + cb.value + '"]');
            if (div) div.style.display = cb.checked ? 'block' : 'none';
            document.querySelectorAll('.clean-proj-' + cb.value).forEach(el => el.checked = cb.checked);
        }

        // ==================== 初始化 ====================
        function init() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => navigateTo(tab.dataset.tab));
            });
            // 关闭清理模态
            document.getElementById('cleanModal').addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });
            document.getElementById('imgPreviewModal').addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });
            renderCurrentTab();
        }

        document.addEventListener('DOMContentLoaded', init);
        console.log('🏗️ CRCCRE质监"三阶四验"系统已就绪 | 作者: cr7');
        console.log('数据存储键:', STORAGE_KEY);
        console.log('项目总数:', _projects.length);
    </script>
